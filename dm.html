   Init
══════════════════════════════════════════ */
(function init() {
  const saved = loadSession();
  if (saved) {
    currentUser = saved;
    sbGetPlayer(saved).then(row => {
      if (row) enterDM();
      else clearSession();
    }).catch(() => {});
  }
  updateEmptyState();
})();

/* ══════════════════════════════════════════
   Player Drawer
══════════════════════════════════════════ */
let _drawerPlayer  = null;
let _drawerChar    = null;
let _drawerSection = 'perso'; // 'perso' | 'inventaire'
let _drawerSaveTimer = null;

document.getElementById('btn-open-drawer').addEventListener('click', openDrawer);
document.getElementById('btn-close-drawer').addEventListener('click', closeDrawer);
document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);

function openDrawer() {
  document.getElementById('player-drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
  document.getElementById('btn-open-drawer').classList.add('active');
  renderDrawerTabs();
}

function closeDrawer() {
  document.getElementById('player-drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
  document.getElementById('btn-open-drawer').classList.remove('active');
}

function renderDrawerTabs() {
  const players = allPlayers.filter(p => p.username !== ADMIN_USER);
  const tabs = document.getElementById('drawer-tabs');
  tabs.innerHTML = players.map(p => {
    const name = p.data?.characters?.[p.data?.activeCharId]?.name || p.username;
    return `<button class="drawer-tab${_drawerPlayer === p.username ? ' active' : ''}" data-du="${esc(p.username)}">${esc(name)}</button>`;
  }).join('');
  tabs.querySelectorAll('.drawer-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      _drawerPlayer = btn.dataset.du;
      _drawerChar = null;
      renderDrawerTabs();
      renderDrawerBody();
    });
  });
  if (!_drawerPlayer && players.length) {
    _drawerPlayer = players[0].username;
    tabs.querySelector('.drawer-tab')?.classList.add('active');
  }
  renderDrawerBody();
}

function renderDrawerBody() {
  const body = document.getElementById('drawer-body');
  if (!_drawerPlayer) { body.innerHTML = '<div class="loading">Aucun joueur.</div>'; return; }
  const player = allPlayers.find(p => p.username === _drawerPlayer);
  if (!player) { body.innerHTML = '<div class="loading">Joueur introuvable.</div>'; return; }

  const pdata  = player.data || {};
  const chars  = pdata.characters || {};
  const charIds = Object.keys(chars);
  if (!_drawerChar || !chars[_drawerChar]) _drawerChar = pdata.activeCharId || charIds[0] || null;
  const slot = _drawerChar ? chars[_drawerChar] : null;
  const c    = slot?.character || {};
  const inv  = slot?.inventory || { items: [], currency: {} };
  const items = inv.items || [];
  const cur   = inv.currency || {};

  const modStr = v => { const m = Math.floor(((parseInt(v)||10)-10)/2); return (m>=0?'+':'')+m; };
  const fv = (f, def='') => c[f] ?? def;
  const avatar   = pdata.avatar || '🧙';
  const charName = slot?.name || 'Personnage';
  const charSub  = [c.classe, c.niveau ? 'Niv. '+c.niveau : '', c.race].filter(Boolean).join(' · ');

  const CAT_OPTIONS = [
    {value:'',label:'—'},
    {value:'arme',label:'⚔ Arme'},
    {value:'armure',label:'🛡 Armure'},
    {value:'consommable',label:'⚗ Consommable'},
    {value:'magique',label:'✦ Magique'},
    {value:'equipement',label:'🎒 Équipement'},
  ];

  body.innerHTML = `
    <div class="ds-player-header">
      <span class="ds-avatar">${esc(avatar)}</span>
      <div>
        <div class="ds-player-name">${esc(charName)}</div>
        <div class="ds-player-sub">${esc(pdata.email || _drawerPlayer)}${charSub ? ' · '+esc(charSub) : ''}</div>
      </div>
    </div>

    ${charIds.length > 1 ? `<div class="ds-char-tabs">${charIds.map(cid =>
      `<button class="ds-char-tab${cid===_drawerChar?' active':''}" data-cid="${esc(cid)}">${esc(chars[cid]?.name||cid)}</button>`
    ).join('')}</div>` : ''}

    <div class="drawer-inner-tabs">
      <button class="drawer-inner-tab${_drawerSection==='perso'?' active':''}" data-sec="perso">🗡 Personnage</button>
      <button class="drawer-inner-tab${_drawerSection==='inventaire'?' active':''}" data-sec="inventaire">🎒 Inventaire</button>
      <button class="drawer-inner-tab${_drawerSection==='sorts'?' active':''}" data-sec="sorts">✨ Sorts</button>
    </div>

    ${_drawerSection === 'sorts' ? (() => {
      const spells = c.spells || [];
      const niveau = parseInt(c.niveau) || 1;
      const pb = Math.ceil(niveau / 4) + 1;
      // joueurs.html stores the casting stat in c.caractSort (uppercase: 'INT', 'SAG'…)
      const statKey = (c.caractSort || c.sortStat || c.spellcastingAbility || 'int').toLowerCase();
      const statScore = parseInt(c[statKey]) || 10;
      const statMod = Math.floor((statScore - 10) / 2);
      const dc = 8 + pb + statMod;
      const atkBonus = pb + statMod;
      const grouped = {};
      spells.forEach(s => {
        const lvl = s.level ?? s.niveau ?? 0;
        if (!grouped[lvl]) grouped[lvl] = [];
        grouped[lvl].push(s);
      });
      const levelLabel = lvl => parseInt(lvl) === 0 ? '✧ Cantrips' : `✦ Level ${lvl}`;
      return `
      <div class="ds-section">
        <div class="ds-spell-calcs">
          <div class="ds-spell-calc"><div class="ds-label">Spell DC</div><div class="ds-value" style="font-size:1.1rem;font-weight:700;color:var(--gold);">${dc}</div></div>
          <div class="ds-spell-calc"><div class="ds-label">Spell Atk.</div><div class="ds-value" style="font-size:1.1rem;font-weight:700;color:var(--gold);">${atkBonus >= 0 ? '+' : ''}${atkBonus}</div></div>
          <div class="ds-spell-calc"><div class="ds-label">Cast. Mod.</div><div class="ds-value" style="font-size:0.9rem;color:var(--text-mid);">${statKey.toUpperCase()} (${statMod >= 0 ? '+' : ''}${statMod})</div></div>
        </div>
        <input type="search" class="ds-spell-filter" id="ds-spell-search" placeholder="Filter spells…">
        <div id="ds-spells-container">
          ${Object.keys(grouped).sort((a, b) => parseInt(a) - parseInt(b)).map(lvl => `
            <div class="ds-spell-level-group">
              <div class="ds-spell-level-header">${levelLabel(lvl)} <span style="color:var(--text-dim);font-weight:400;">(${grouped[lvl].length})</span></div>
              ${grouped[lvl].map(s => `
                <div class="ds-spell-item">
                  <div class="ds-spell-name">
                    ${esc(s.name || '—')}
                    ${s.conc ? `<span class="ds-spell-conc" title="Concentration">C</span>` : ''}
                  </div>
                  <div class="ds-spell-meta">
                    ${s.action ? `<span class="ds-spell-tag">⏱ ${esc(s.action)}</span>` : ''}
                    ${s.portee ? `<span class="ds-spell-tag">⦾ ${esc(s.portee)}</span>` : ''}
                    ${(s.degat || s.damage) ? `<span class="ds-spell-tag ds-spell-dmg">⚔ ${esc(s.degat || s.damage)}${s.typeDegat ? ' ' + esc(s.typeDegat) : ''}</span>` : ''}
                    ${s.desc ? `<span class="ds-spell-tag" style="color:var(--text-dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(s.desc)}">${esc(s.desc.slice(0,40))}${s.desc.length>40?'…':''}</span>` : ''}
                  </div>
                </div>`).join('')}
            </div>`).join('')}
          ${!spells.length ? `<div style="color:var(--text-dim);font-size:0.82rem;font-style:italic;padding:0.5rem 0;">No spells recorded.</div>` : ''}
        </div>
      </div>`;
    })() : _drawerSection === 'perso' ? `
    <!-- ══ ONGLET PERSONNAGE ══ -->
    <div class="ds-section">
      <div class="ds-section-title">Infos</div>
      <div class="ds-grid ds-grid-3" style="margin-bottom:0.55rem;">
        <div class="ds-field"><label class="ds-label">Nom</label><input class="ds-input" data-field="name_slot" value="${esc(slot?.name||'')}"></div>
        <div class="ds-field"><label class="ds-label">Classe</label><input class="ds-input" data-field="classe" value="${esc(fv('classe'))}"></div>
        <div class="ds-field"><label class="ds-label">Niveau</label><input class="ds-input center" type="number" min="1" max="20" data-field="niveau" value="${esc(fv('niveau','1'))}"></div>
      </div>
      <div class="ds-grid ds-grid-2">
        <div class="ds-field"><label class="ds-label">Race</label><input class="ds-input" data-field="race" value="${esc(fv('race'))}"></div>
        <div class="ds-field"><label class="ds-label">Background</label><input class="ds-input" data-field="background" value="${esc(fv('background'))}"></div>
      </div>
    </div>
    <div class="ds-section">
      <div class="ds-section-title">❤ Points de vie</div>
      <div class="ds-grid ds-grid-3">
        <div class="ds-field"><label class="ds-label">PV Actuels</label><input class="ds-input big center heal" type="number" data-field="pvActuel" value="${esc(fv('pvActuel','0'))}"></div>
        <div class="ds-field"><label class="ds-label">PV Max</label><input class="ds-input big center" type="number" data-field="pvMax" value="${esc(fv('pvMax','0'))}"></div>
        <div class="ds-field"><label class="ds-label">PV Temp</label><input class="ds-input center" type="number" data-field="pvTemp" value="${esc(fv('pvTemp','0'))}"></div>
      </div>
    </div>
    <div class="ds-section">
      <div class="ds-section-title">⚡ Caractéristiques</div>
      <div class="ds-grid ds-grid-6">
        ${['for','dex','con','int','sag','cha'].map(stat => `
          <div class="ds-score-cell">
            <div class="ds-label">${stat.toUpperCase()}</div>
            <input class="ds-input" type="number" min="1" max="30" data-field="${stat}" value="${esc(fv(stat,'10'))}">
            <div class="ds-score-mod">${modStr(fv(stat,'10'))}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="ds-section">
      <div class="ds-section-title">🛡 Combat</div>
      <div class="ds-grid ds-grid-3">
        <div class="ds-field"><label class="ds-label">Classe d'armure</label><input class="ds-input center" type="number" data-field="ca" value="${esc(fv('ca',fv('ac','10')))}"></div>
        <div class="ds-field"><label class="ds-label">Vitesse (m)</label><input class="ds-input center" data-field="vitesse" value="${esc(fv('vitesse','30'))}"></div>
        <div class="ds-field"><label class="ds-label">Or legacy</label><input class="ds-input center" type="number" data-field="gold" value="${esc(fv('gold','0'))}"></div>
      </div>
    </div>
    ${(c.attaques||[]).length ? `
    <div class="ds-section">
      <div class="ds-section-title">⚔ Attaques</div>
      <div class="ds-list">
        ${(c.attaques||[]).map(a => `<div class="ds-list-item">
          <span class="ds-list-name">${esc(a.name||'—')}</span>
          <span class="ds-list-badge">${esc(a.degats||'—')}</span>
          <span class="ds-list-badge">${esc(a.typeDegat||'')}</span>
        </div>`).join('')}
      </div>
    </div>` : ''}
    ${(c.spells||[]).length ? `
    <div class="ds-section">
      <div class="ds-section-title">✨ Spells <span style="font-size:0.72rem;color:var(--text-dim);font-weight:400;">(${(c.spells||[]).length})</span></div>
      <div class="ds-list">
        ${(c.spells||[]).map(s => `<div class="ds-list-item">
          <span class="ds-list-name">${esc(s.name||'—')}</span>
          ${s.level!==undefined&&s.level!=='0'?`<span class="ds-list-badge">Lvl.${s.level}</span>`:''}
          ${!s.level||s.level==='0'?`<span class="ds-list-badge">Cantrip</span>`:''}
          ${s.conc?`<span class="ds-list-badge">C</span>`:''}
        </div>`).join('')}
      </div>
    </div>` : ''}
    <div class="ds-section">
      <div class="ds-section-title">📝 Notes</div>
      <textarea class="ds-textarea" data-field="backstory" rows="4" placeholder="Backstory…">${esc(fv('backstory',''))}</textarea>
      <textarea class="ds-textarea" data-field="personnalite" rows="2" placeholder="Personnalité…" style="margin-top:0.4rem;">${esc(fv('personnalite',''))}</textarea>
    </div>
    ` : `
    <!-- ══ ONGLET INVENTAIRE ══ -->
    <div class="ds-section">
      <div class="ds-section-title">💰 Monnaie</div>
      <div class="ds-currency">
        ${[['pp','Platine'],['gp','Or'],['ep','Electrum'],['sp','Argent'],['cp','Cuivre']].map(([k,lbl]) => `
          <div class="ds-currency-cell">
            <div class="ds-label">${lbl}</div>
            <input class="ds-input center" type="number" min="0" data-inv-currency="${k}" value="${cur[k]||0}">
          </div>`).join('')}
      </div>
    </div>
    <div class="ds-section">
      <div class="ds-section-title" style="justify-content:space-between;">
        <span>🎒 Objets <span style="color:var(--text-dim);font-size:0.8em;">(${items.length})</span></span>
      </div>
      ${items.length ? `
      <table class="ds-inv-table">
        <thead><tr>
          <th style="width:45px;">Qté</th>
          <th>Nom</th>
          <th>Description</th>
          <th style="width:100px;">Catégorie</th>
          <th style="width:28px;"></th>
        </tr></thead>
        <tbody id="ds-inv-tbody">
          ${items.map((it,i) => `<tr data-inv-row="${i}">
            <td><input class="ds-inv-inp center" type="number" min="0" data-inv-i="${i}" data-inv-k="qty" value="${it.qty||1}"></td>
            <td><input class="ds-inv-inp" data-inv-i="${i}" data-inv-k="name" value="${esc(it.name||'')}" placeholder="Nom"></td>
            <td><input class="ds-inv-inp" data-inv-i="${i}" data-inv-k="notes" value="${esc(it.notes||'')}" placeholder="Description"></td>
            <td><select class="ds-inv-select" data-inv-i="${i}" data-inv-k="cat">
              ${CAT_OPTIONS.map(o=>`<option value="${o.value}"${it.cat===o.value?' selected':''}>${o.label}</option>`).join('')}
            </select></td>
            <td><button class="ds-inv-del" data-del-inv="${i}">✕</button></td>
          </tr>`).join('')}
        </tbody>
      </table>` : `<div style="color:var(--text-dim);font-size:0.82rem;font-style:italic;padding:0.5rem 0;">Aucun objet.</div>`}
      <button class="ds-add-item-btn" id="ds-btn-add-item">+ Ajouter un objet</button>
    </div>
    `}
  `;

  // Char tab switch
  body.querySelectorAll('.ds-char-tab').forEach(btn => {
    btn.addEventListener('click', () => { _drawerChar = btn.dataset.cid; renderDrawerBody(); });
  });
  // Inner section switch
  body.querySelectorAll('.drawer-inner-tab').forEach(btn => {
    btn.addEventListener('click', () => { _drawerSection = btn.dataset.sec; renderDrawerBody(); });
  });

  if (_drawerSection === 'perso') {
    // Score mod live
    body.querySelectorAll('[data-field="for"],[data-field="dex"],[data-field="con"],[data-field="int"],[data-field="sag"],[data-field="cha"]').forEach(inp => {
      inp.addEventListener('input', () => {
        inp.closest('.ds-score-cell')?.querySelector('.ds-score-mod')?.textContent && (inp.closest('.ds-score-cell').querySelector('.ds-score-mod').textContent = modStr(inp.value));
      });
    });
    body.querySelectorAll('[data-field]').forEach(el => {
      el.addEventListener('input',  () => scheduleDrawerSave());
      el.addEventListener('change', () => scheduleDrawerSave());
    });
  } else if (_drawerSection === 'sorts') {
    // Sorts search filter (read-only tab, no save)
    const spellSearch = body.querySelector('#ds-spell-search');
    spellSearch?.addEventListener('input', () => {
      const q = spellSearch.value.toLowerCase().trim();
      body.querySelectorAll('.ds-spell-item').forEach(item => {
        item.style.display = q && !item.textContent.toLowerCase().includes(q) ? 'none' : '';
      });
      body.querySelectorAll('.ds-spell-level-group').forEach(grp => {
        const hasVisible = [...grp.querySelectorAll('.ds-spell-item')].some(it => it.style.display !== 'none');
        grp.style.display = hasVisible ? '' : 'none';
      });
    });
  } else {
    // Currency inputs
    body.querySelectorAll('[data-inv-currency]').forEach(el => {
      el.addEventListener('input', () => scheduleDrawerSave());
    });
    // Item inputs
    body.querySelectorAll('[data-inv-i]').forEach(el => {
      el.addEventListener('input',  () => scheduleDrawerSave());
      el.addEventListener('change', () => scheduleDrawerSave());
    });
    // Delete item
    body.querySelectorAll('[data-del-inv]').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.delInv);
        inv.items.splice(i, 1);
        if (!slot.inventory) slot.inventory = inv;
        scheduleDrawerSave();
        renderDrawerBody();
      });
    });
    // Add item
    document.getElementById('ds-btn-add-item')?.addEventListener('click', () => {
      if (!slot.inventory) slot.inventory = { items: [], currency: {} };
      slot.inventory.items.push({ name: '', qty: 1, notes: '', cat: '' });
      scheduleDrawerSave();
      renderDrawerBody();
    });
  }
}

function scheduleDrawerSave() {
  const dot = document.getElementById('drawer-dot');
  const txt = document.getElementById('drawer-save-text');
  dot.className = 'save-dot saving';
  txt.textContent = 'Modification…';
  clearTimeout(_drawerSaveTimer);
  _drawerSaveTimer = setTimeout(commitDrawerSave, 900);
}

async function commitDrawerSave() {
  if (_drawerSection === 'sorts') return; // lecture seule
  if (!_drawerPlayer || !_drawerChar) return;
  const player = allPlayers.find(p => p.username === _drawerPlayer);
  if (!player) return;

  const pdata = player.data || {};
  const chars = pdata.characters || {};
  const slot  = chars[_drawerChar];
  if (!slot) return;
  if (!slot.character)  slot.character  = {};
  if (!slot.inventory)  slot.inventory  = { items: [], currency: {} };
  const c   = slot.character;
  const inv = slot.inventory;

  const body = document.getElementById('drawer-body');

  if (_drawerSection === 'perso') {
    body.querySelectorAll('[data-field]').forEach(el => {
      const f = el.dataset.field;
      const v = el.value;
      if (f === 'name_slot') slot.name = v;
      else c[f] = el.type === 'number' ? (parseFloat(v) || 0) : v;
    });
  } else {
    // Currency
    body.querySelectorAll('[data-inv-currency]').forEach(el => {
      inv.currency[el.dataset.invCurrency] = parseInt(el.value) || 0;
    });
    // Items
    const rows = body.querySelectorAll('[data-inv-row]');
    rows.forEach(row => {
      const i = parseInt(row.dataset.invRow);
      if (!inv.items[i]) return;
      row.querySelectorAll('[data-inv-k]').forEach(el => {
        const k = el.dataset.invK;
        inv.items[i][k] = k === 'qty' ? (parseInt(el.value) || 0) : el.value;
      });
    });
  }

  const dot = document.getElementById('drawer-dot');
  const txt = document.getElementById('drawer-save-text');
  try {
    await sbUpdateData(_drawerPlayer, pdata);
    const idx = allPlayers.findIndex(p => p.username === _drawerPlayer);
    if (idx !== -1) allPlayers[idx].data = pdata;
    refreshOpenPanels();
    dot.className = 'save-dot saved';
    txt.textContent = 'Sauvegardé ✓';
    setTimeout(() => { dot.className = 'save-dot'; txt.textContent = '—'; }, 2500);
  } catch(e) {
    dot.className = 'save-dot';
    txt.textContent = 'Erreur de sauvegarde';
  }
}
</script>
