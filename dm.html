<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleysur — DM Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c10;--bg-nav:#0e0f14;--bg-card:#13151c;--bg-input:#0a0b10;
  --gold:#e8c96a;--gold-dark:#b8962a;--gold-dim:#7a6020;
  --gold-glow:rgba(232,201,106,0.12);--gold-glow2:rgba(232,201,106,0.22);
  --border:#1e2130;--border-bright:#2e3450;--border-gold:rgba(232,201,106,0.25);
  --text:#d4cdb8;--text-dim:#6a6880;--text-mid:#9a9480;
  --danger:#d94040;--danger-dim:rgba(217,64,64,0.14);--danger-bright:rgba(217,64,64,0.35);
  --heal:#3db87a;--heal-dim:rgba(61,184,122,0.14);
  --warn:#d4843a;
  --radius:8px;--sidebar-w:280px;--nav-h:54px;
  --shadow:0 2px 12px rgba(0,0,0,0.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.7);
  --shadow-gold:0 0 20px rgba(232,201,106,0.1);
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select{font-family:inherit;color-scheme:dark;}

/* ── Nav ── */
#dm-nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:300;
  background:var(--bg-nav);
  border-bottom:1px solid var(--border-bright);
  display:flex;align-items:center;padding:0 1.25rem;gap:0.75rem;
  box-shadow:0 1px 0 rgba(232,201,106,0.06),0 4px 20px rgba(0,0,0,0.6);
}
.brand{
  font-family:'Cinzel',serif;color:var(--gold);font-size:1.05rem;
  letter-spacing:0.1em;white-space:nowrap;display:flex;align-items:center;gap:0.6rem;
  text-shadow:0 0 20px rgba(232,201,106,0.3);
}
.brand-sep{width:1px;height:16px;background:var(--border-bright);}
.brand-sub{color:var(--text-dim);font-size:0.7rem;font-family:'Crimson Text',serif;letter-spacing:0.05em;font-style:italic;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:0.4rem;}
#poll-indicator{font-size:0.65rem;color:var(--text-dim);white-space:nowrap;padding:0 0.3rem;}
.nav-btn{
  background:rgba(255,255,255,0.03);border:1px solid var(--border-bright);color:var(--text-mid);
  padding:0.28rem 0.75rem;border-radius:6px;font-size:0.72rem;
  transition:all 0.15s;white-space:nowrap;letter-spacing:0.03em;
}
.nav-btn:hover{color:var(--gold);border-color:var(--border-gold);background:var(--gold-glow);box-shadow:var(--shadow-gold);}
.nav-btn.active{background:var(--gold-glow);color:var(--gold);border-color:var(--border-gold);}
#btn-logout{
  background:none;border:1px solid var(--border-bright);color:var(--text-dim);
  padding:0.28rem 0.75rem;border-radius:6px;font-size:0.72rem;transition:all 0.15s;
}
#btn-logout:hover{color:var(--danger);border-color:var(--danger-bright);background:var(--danger-dim);}

/* ── Auth ── */
#screen-auth{
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;
  background:
    radial-gradient(ellipse 60% 50% at 50% 20%,rgba(232,201,106,0.05) 0%,transparent 100%),
    radial-gradient(ellipse 40% 60% at 80% 80%,rgba(70,80,140,0.06) 0%,transparent 100%);
}
.auth-box{
  background:var(--bg-card);
  border:1px solid var(--border-bright);
  border-top:1px solid var(--border-gold);
  border-radius:12px;
  padding:3rem 2.5rem;width:100%;max-width:360px;
  box-shadow:var(--shadow-lg),0 0 40px rgba(0,0,0,0.5);
  position:relative;overflow:hidden;
}
.auth-box::after{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dark),transparent);
  opacity:0.6;
}
.auth-icon{font-size:2.5rem;text-align:center;margin-bottom:0.75rem;filter:drop-shadow(0 0 12px rgba(232,201,106,0.3));}
.auth-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.4rem;text-align:center;margin-bottom:0.3rem;letter-spacing:0.1em;text-shadow:0 0 20px rgba(232,201,106,0.2);}
.auth-sub{font-size:0.8rem;color:var(--text-dim);text-align:center;margin-bottom:2rem;letter-spacing:0.06em;font-style:italic;}
.auth-label{display:block;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-mid);margin-bottom:0.35rem;}
.auth-input{
  width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border-bright);
  border-radius:6px;color:var(--text);padding:0.65rem 0.9rem;
  margin-bottom:1.1rem;font-size:1rem;transition:border-color 0.15s,box-shadow 0.15s;
}
.auth-input:focus{outline:none;border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(232,201,106,0.1);}
.auth-btn{
  width:100%;
  background:linear-gradient(135deg,#c8962a 0%,#a07020 50%,#c8962a 100%);
  background-size:200% 100%;
  color:#fff;border:1px solid rgba(232,201,106,0.3);border-radius:6px;padding:0.75rem;
  font-family:'Cinzel',serif;font-size:0.95rem;letter-spacing:0.08em;
  transition:all 0.3s;box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 20px rgba(200,150,42,0.1);
}
.auth-btn:hover{background-position:100% 0;box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 30px rgba(200,150,42,0.2);}
.auth-error{color:var(--danger);font-size:0.8rem;text-align:center;margin-top:0.85rem;min-height:1.2em;}

/* ── Layout ── */
#screen-dm{display:none;padding-top:var(--nav-h);}
#dm-layout{display:flex;height:calc(100vh - var(--nav-h));}

/* ── Sidebar ── */
#dm-sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg-nav);
  border-right:1px solid var(--border-bright);
  display:flex;flex-direction:column;overflow:hidden;
}
#sidebar-top{
  padding:0.9rem 1rem 0.7rem;
  border-bottom:1px solid var(--border-bright);
  display:flex;flex-direction:column;gap:0.5rem;
}
.sidebar-section-title{
  font-family:'Cinzel',serif;color:var(--gold);font-size:0.65rem;
  letter-spacing:0.12em;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:0.35rem;
  border-bottom:1px solid var(--border);
}
#player-search{
  width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border-bright);
  border-radius:6px;color:var(--text);padding:0.38rem 0.75rem;font-size:0.8rem;
  transition:border-color 0.15s;
}
#player-search:focus{outline:none;border-color:var(--gold-dim);}
#player-search::placeholder{color:var(--text-dim);}
#player-list{flex:1;overflow-y:auto;padding:0.4rem 0;}
#player-list::-webkit-scrollbar{width:3px;}
#player-list::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}

/* Player items */
.player-item{padding:0.5rem 1rem;cursor:pointer;transition:background 0.12s;border-left:2px solid transparent;}
.player-item:hover{background:rgba(232,201,106,0.04);border-left-color:var(--border-gold);}
.player-item.expanded{background:rgba(232,201,106,0.05);border-left-color:var(--gold-dim);}
.player-head{display:flex;align-items:center;gap:0.6rem;}
.player-avatar{font-size:1.1rem;line-height:1;flex-shrink:0;width:24px;text-align:center;}
.player-info{flex:1;min-width:0;}
.player-name{font-family:'Cinzel',serif;font-size:0.76rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-hp-mini{height:3px;background:var(--border-bright);border-radius:2px;margin-top:5px;overflow:hidden;}
.player-hp-mini-bar{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s;}
.player-expand-icon{font-size:0.5rem;color:var(--text-dim);transition:transform 0.15s;flex-shrink:0;}
.player-item.expanded .player-expand-icon{transform:rotate(90deg);}
.char-list{display:none;padding:0.2rem 0 0.3rem 2.6rem;}
.player-item.expanded .char-list{display:block;}
.char-entry{
  padding:0.25rem 0.5rem;border-radius:5px;cursor:pointer;font-size:0.77rem;
  color:var(--text-dim);transition:all 0.12s;display:flex;align-items:center;gap:0.4rem;
}
.char-entry:hover{background:rgba(232,201,106,0.07);color:var(--text);}
.char-entry.open{color:var(--gold);background:rgba(232,201,106,0.05);}
.char-dot{width:6px;height:6px;border-radius:50%;background:var(--border-bright);flex-shrink:0;transition:all 0.2s;}
.char-entry.open .char-dot{background:var(--gold);box-shadow:0 0 6px rgba(232,201,106,0.5);}

/* Monster section */
#monster-section{
  border-top:1px solid var(--border-bright);
  padding:0.65rem 1rem 0.75rem;
}
#monster-section-title{
  font-family:'Cinzel',serif;color:var(--danger);font-size:0.65rem;
  letter-spacing:0.12em;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:0.5rem;padding-bottom:0.35rem;border-bottom:1px solid var(--border);
}
#btn-add-monster{
  background:rgba(217,64,64,0.08);border:1px solid var(--danger-bright);
  color:var(--danger);font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:4px;transition:all 0.1s;
}
#btn-add-monster:hover{background:var(--danger-dim);box-shadow:0 0 8px rgba(217,64,64,0.15);}
#monster-list{display:flex;flex-direction:column;gap:0.2rem;margin-bottom:0.4rem;}
.monster-sidebar-entry{
  display:flex;align-items:center;gap:0.5rem;font-size:0.77rem;color:var(--text-dim);
  cursor:pointer;padding:0.28rem 0.45rem;border-radius:5px;
  transition:all 0.12s;border-left:2px solid transparent;
}
.monster-sidebar-entry:hover{background:var(--danger-dim);color:var(--text);border-left-color:var(--danger);}
.monster-sidebar-entry.open{background:var(--danger-dim);color:#e08070;border-left-color:var(--danger);}
.monster-sidebar-entry .m-dot{width:6px;height:6px;border-radius:50%;background:var(--danger);opacity:0.4;flex-shrink:0;}
.monster-sidebar-entry.open .m-dot{opacity:1;box-shadow:0 0 5px rgba(217,64,64,0.4);}

/* Monster form */
#monster-form{display:none;background:rgba(217,64,64,0.06);border:1px solid rgba(217,64,64,0.2);border-radius:var(--radius);padding:0.75rem;margin-top:0.4rem;}
#monster-form.open{display:block;}
.m-form-row{display:flex;gap:0.4rem;margin-bottom:0.4rem;}
.m-inp{flex:1;background:rgba(0,0,0,0.35);border:1px solid var(--border-bright);color:var(--text);border-radius:5px;padding:0.28rem 0.5rem;font-size:0.8rem;min-width:0;transition:border-color 0.15s;}
.m-inp:focus{outline:none;border-color:rgba(217,64,64,0.5);}
.m-inp-sm{width:52px;flex:none;}
#btn-create-monster{width:100%;background:linear-gradient(135deg,#c03030 0%,#902020 100%);color:#fff;border:1px solid rgba(217,64,64,0.4);border-radius:5px;padding:0.38rem;font-size:0.75rem;font-family:'Cinzel',serif;letter-spacing:0.04em;transition:all 0.15s;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
#btn-create-monster:hover{background:linear-gradient(135deg,#d04040 0%,#a03030 100%);}

/* sep */
.sep-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);padding:0.45rem 1rem 0.15rem;}
.loading{color:var(--text-dim);font-size:0.82rem;font-style:italic;padding:1rem 1rem;}

/* ── Player Drawer ── */
#player-drawer{
  position:fixed;top:var(--nav-h);right:0;bottom:0;width:540px;max-width:96vw;
  background:var(--bg-nav);border-left:1px solid var(--border-gold);
  z-index:400;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
  box-shadow:-8px 0 48px rgba(0,0,0,0.7);
}
#player-drawer.open{transform:translateX(0);}
#drawer-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:399;
  display:none;backdrop-filter:blur(1px);
}
#drawer-backdrop.open{display:block;}

/* Drawer header */
#drawer-header{
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--border-gold);
  background:var(--bg-card);flex-shrink:0;
}
#drawer-tabs{display:flex;flex:1;overflow-x:auto;gap:0;}
#drawer-tabs::-webkit-scrollbar{height:2px;}
#drawer-tabs::-webkit-scrollbar-thumb{background:var(--border-bright);}
.drawer-tab{
  padding:0.6rem 1rem;font-family:'Cinzel',serif;font-size:0.72rem;
  letter-spacing:0.06em;color:var(--text-dim);background:none;border:none;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;
  cursor:pointer;flex-shrink:0;
}
.drawer-tab:hover{color:var(--gold);}
.drawer-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(232,201,106,0.04);}
#btn-close-drawer{
  background:none;border:none;color:var(--text-dim);font-size:1.1rem;
  padding:0.5rem 0.85rem;transition:color 0.15s;flex-shrink:0;
  border-left:1px solid var(--border);
}
#btn-close-drawer:hover{color:var(--danger);}

/* Drawer body */
#drawer-body{flex:1;overflow-y:auto;padding:1.1rem;}
#drawer-body::-webkit-scrollbar{width:4px;}
#drawer-body::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}

/* Drawer sections */
.ds-section{margin-bottom:1.25rem;}
.ds-section-title{
  font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--gold-dark);margin-bottom:0.65rem;
  padding-bottom:0.35rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0.4rem;
}
.ds-player-header{
  display:flex;align-items:center;gap:0.9rem;
  background:var(--bg-card);border:1px solid var(--border-bright);
  border-radius:8px;padding:0.85rem 1rem;margin-bottom:1rem;
}
.ds-avatar{font-size:2rem;}
.ds-player-name{font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;letter-spacing:0.05em;}
.ds-player-sub{font-size:0.75rem;color:var(--text-dim);margin-top:2px;font-style:italic;}

/* Char selector within drawer */
.ds-char-tabs{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1rem;}
.ds-char-tab{
  background:var(--bg-card);border:1px solid var(--border-bright);
  color:var(--text-dim);border-radius:5px;padding:0.28rem 0.7rem;
  font-size:0.76rem;cursor:pointer;transition:all 0.12s;
}
.ds-char-tab:hover{border-color:var(--border-gold);color:var(--gold);}
.ds-char-tab.active{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}

/* Fields grid */
.ds-grid{display:grid;gap:0.55rem;}
.ds-grid-2{grid-template-columns:1fr 1fr;}
.ds-grid-3{grid-template-columns:1fr 1fr 1fr;}
.ds-grid-6{grid-template-columns:repeat(6,1fr);}
.ds-field{display:flex;flex-direction:column;gap:0.22rem;}
.ds-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);}
.ds-input{
  background:rgba(0,0,0,0.3);border:1px solid var(--border-bright);
  border-radius:5px;color:var(--text);padding:0.38rem 0.55rem;
  font-size:0.9rem;font-family:'Crimson Text',serif;transition:border-color 0.15s,box-shadow 0.15s;
  width:100%;
}
.ds-input:focus{outline:none;border-color:var(--gold-dim);box-shadow:0 0 0 2px rgba(232,201,106,0.08);}
.ds-input.center{text-align:center;font-family:'Cinzel',serif;}
.ds-input.big{font-size:1.1rem;font-family:'Cinzel',serif;color:var(--gold);}
.ds-input.danger{color:var(--danger);}
.ds-input.heal{color:var(--heal);}
.ds-textarea{
  background:rgba(0,0,0,0.3);border:1px solid var(--border-bright);
  border-radius:5px;color:var(--text);padding:0.5rem 0.65rem;
  font-size:0.88rem;font-family:'Crimson Text',serif;
  resize:vertical;min-height:70px;width:100%;transition:border-color 0.15s;
}
.ds-textarea:focus{outline:none;border-color:var(--gold-dim);}

/* Score cell special */
.ds-score-cell{
  background:var(--bg-card);border:1px solid var(--border-bright);
  border-radius:7px;padding:0.5rem 0.3rem;text-align:center;
}
.ds-score-cell .ds-input{background:none;border:none;text-align:center;font-family:'Cinzel',serif;font-size:1.05rem;color:var(--gold);padding:0.1rem 0;}
.ds-score-cell .ds-input:focus{box-shadow:none;}
.ds-score-mod{font-size:0.75rem;color:var(--text-dim);margin-top:1px;}

/* Save indicator */
#drawer-save-status{
  padding:0.45rem 1.1rem;font-size:0.72rem;color:var(--text-dim);
  border-top:1px solid var(--border);background:var(--bg-card);
  flex-shrink:0;display:flex;align-items:center;gap:0.5rem;
}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0;transition:background 0.2s;}
.save-dot.saving{background:var(--warn);}
.save-dot.saved{background:var(--heal);}

/* Attacks / spells list in drawer */
.ds-list{display:flex;flex-direction:column;gap:0.3rem;}
.ds-list-item{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:5px;padding:0.45rem 0.7rem;font-size:0.82rem;
  display:flex;align-items:center;gap:0.5rem;color:var(--text-mid);
}
.ds-list-name{flex:1;color:var(--text);}
.ds-list-badge{
  font-size:0.7rem;color:var(--text-dim);background:var(--border-bright);
  border-radius:3px;padding:0.08rem 0.35rem;white-space:nowrap;
}

/* Drawer inner tabs (Personnage / Inventaire) */
.drawer-inner-tabs{display:flex;gap:0;border-bottom:1px solid var(--border-bright);margin-bottom:1rem;flex-shrink:0;}
.drawer-inner-tab{
  padding:0.45rem 1rem;font-size:0.75rem;font-family:'Cinzel',serif;letter-spacing:0.05em;
  color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;transition:all 0.15s;
}
.drawer-inner-tab:hover{color:var(--gold);}
.drawer-inner-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* Currency row */
.ds-currency{display:flex;gap:0.4rem;margin-bottom:1rem;}
.ds-currency-cell{flex:1;text-align:center;}
.ds-currency-cell .ds-label{margin-bottom:0.2rem;}
.ds-currency-cell .ds-input{text-align:center;font-family:'Cinzel',serif;font-size:0.95rem;}

/* Inventory table */
.ds-inv-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.ds-inv-table th{
  font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--gold-dark);padding:0.3rem 0.4rem;border-bottom:1px solid var(--border-bright);
  text-align:left;
}
.ds-inv-table td{padding:0.22rem 0.3rem;border-bottom:1px solid var(--border);}
.ds-inv-table tr:last-child td{border-bottom:none;}
.ds-inv-inp{
  background:rgba(0,0,0,0.25);border:1px solid transparent;border-radius:4px;
  color:var(--text);padding:0.2rem 0.35rem;font-family:'Crimson Text',serif;font-size:0.82rem;
  width:100%;transition:border-color 0.12s;
}
.ds-inv-inp:focus{outline:none;border-color:var(--gold-dim);background:rgba(0,0,0,0.4);}
.ds-inv-inp.center{text-align:center;}
.ds-inv-select{
  background:rgba(0,0,0,0.25);border:1px solid transparent;border-radius:4px;
  color:var(--text-dim);padding:0.2rem 0.25rem;font-size:0.76rem;width:100%;transition:border-color 0.12s;
}
.ds-inv-select:focus{outline:none;border-color:var(--gold-dim);}
.ds-inv-del{
  background:none;border:none;color:var(--text-dim);font-size:0.8rem;
  cursor:pointer;padding:0.15rem 0.3rem;border-radius:3px;transition:all 0.1s;line-height:1;
}
.ds-inv-del:hover{color:var(--danger);background:var(--danger-dim);}
.ds-add-item-btn{
  margin-top:0.65rem;width:100%;background:rgba(232,201,106,0.05);
  border:1px dashed var(--border-gold);color:var(--gold-dark);border-radius:5px;
  padding:0.38rem;font-size:0.78rem;font-family:'Cinzel',serif;letter-spacing:0.04em;
  cursor:pointer;transition:all 0.15s;
}
.ds-add-item-btn:hover{background:var(--gold-glow);border-color:var(--gold);color:var(--gold);}

/* ── Inspiration ── */
.pact.insp-on{color:#f0d060;border-color:#c0a030;background:rgba(240,208,96,0.15);}
.pact.insp-on:hover{color:#f0d060;border-color:#f0d060;background:rgba(240,208,96,0.25);}

/* ── Concentration badge ── */
.conc-badge{
  display:inline-flex;align-items:center;gap:0.25rem;
  font-size:0.66rem;color:#a080e0;background:rgba(160,128,224,0.12);
  border:1px solid rgba(160,128,224,0.3);border-radius:3px;
  padding:0.05rem 0.38rem;margin-left:auto;
}

/* ── Ressources de classe ── */
.panel-res{padding:0.45rem 0.9rem;border-bottom:1px solid var(--border);}
.res-row{display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;margin-bottom:0.22rem;}
.res-row:last-child{margin-bottom:0;}
.res-name{flex:1;color:var(--text-mid);}
.res-pips{display:flex;gap:3px;}
.res-pip{
  width:11px;height:11px;border-radius:50%;border:1px solid var(--border-bright);
  cursor:pointer;transition:all 0.1s;flex-shrink:0;
}
.res-pip.used{background:var(--gold-dark);border-color:var(--gold-dim);}
.res-pip:hover{border-color:var(--gold);}

/* ── Notes DM (locales, non-sync) ── */
.panel-dm-notes{padding:0.45rem 0.9rem;border-top:1px solid var(--border);}
.dm-notes-label{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:0.22rem;}
.dm-notes-inp{
  width:100%;background:rgba(0,0,0,0.2);border:1px solid transparent;
  border-radius:4px;color:var(--text-dim);font-size:0.78rem;font-family:'Crimson Text',serif;
  padding:0.25rem 0.4rem;resize:none;min-height:38px;transition:border-color 0.12s;
}
.dm-notes-inp:focus{outline:none;border-color:var(--border-bright);color:var(--text);}

/* ── Delay chip ── */
.init-chip.delayed{opacity:0.5;border-style:dashed;}
.init-chip.delayed::after{content:'⏸';position:absolute;top:2px;right:4px;font-size:0.5rem;color:var(--text-dim);}
.chip-delay-btn{
  background:none;border:none;color:var(--text-dim);font-size:0.55rem;
  cursor:pointer;padding:0;line-height:1;transition:color 0.1s;
}
.chip-delay-btn:hover{color:var(--gold);}

/* ── Mode focus (sidebar masquée) ── */
body.focus-mode #dm-sidebar{display:none;}
body.focus-mode #dm-main{width:100%;}

/* ── Dice roller ── */
.dice-popup{
  position:absolute;top:calc(100% + 8px);left:0;z-index:500;
  background:var(--bg-card);border:1px solid var(--border-gold);
  border-radius:8px;padding:0.75rem;box-shadow:var(--shadow-lg);
  display:none;min-width:220px;
}
.dice-popup.open{display:block;}
.dice-grid{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.55rem;}
.dice-btn{
  background:var(--bg-input);border:1px solid var(--border-bright);
  color:var(--gold);border-radius:5px;padding:0.35rem 0.6rem;
  font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.04em;
  cursor:pointer;transition:all 0.12s;
}
.dice-btn:hover{background:var(--gold-glow);border-color:var(--border-gold);}
.dice-result{
  font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);
  text-align:center;min-height:1.6rem;letter-spacing:0.05em;
  border-top:1px solid var(--border);padding-top:0.45rem;
}
.dice-result.crit{color:#60e060;text-shadow:0 0 10px rgba(96,224,96,0.4);}
.dice-result.fail{color:var(--danger);}
#nav-dice-wrap{position:relative;}

/* ── Sorts drawer ── */
.ds-spell-filter{
  width:100%;background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;color:var(--text);font-size:0.8rem;padding:0.3rem 0.55rem;
  margin-bottom:0.65rem;box-sizing:border-box;
}
.ds-spell-filter:focus{outline:none;border-color:var(--gold-dark);}
.ds-spell-calcs{
  display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;
}
.ds-spell-calc{
  flex:1;min-width:70px;text-align:center;
  background:var(--bg-card);border:1px solid var(--border);border-radius:5px;
  padding:0.3rem 0.5rem;
}
.ds-spell-calc-label{font-size:0.62rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;}
.ds-spell-calc-val{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);font-weight:700;}
.ds-spell-level-group{margin-bottom:0.6rem;}
.ds-spell-level-header{
  font-family:'Cinzel',serif;font-size:0.67rem;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--gold-dark);margin-bottom:0.3rem;
  padding:0.15rem 0;border-bottom:1px solid var(--border);
}
.ds-spell-item{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;padding:0.35rem 0.6rem;margin-bottom:0.25rem;
  font-size:0.8rem;
}
.ds-spell-name{color:var(--text);font-weight:600;display:flex;align-items:center;gap:0.4rem;margin-bottom:0.12rem;}
.ds-spell-conc{
  font-size:0.62rem;color:#8ad;background:rgba(100,160,220,0.12);
  border:1px solid rgba(100,160,220,0.3);border-radius:10px;padding:0.05rem 0.35rem;
}
.ds-spell-meta{display:flex;gap:0.3rem;flex-wrap:wrap;}
.ds-spell-tag{
  font-size:0.68rem;color:var(--text-dim);background:var(--border-bright);
  border-radius:3px;padding:0.05rem 0.3rem;white-space:nowrap;
}
.ds-spell-dmg{color:var(--danger);background:rgba(200,80,80,0.1);border-color:rgba(200,80,80,0.25);}

/* ── Chat sidebar section ── */
#chat-section{
  border-top:1px solid var(--border-bright);
  display:flex;flex-direction:column;max-height:320px;flex-shrink:0;
}
#chat-room-tabs{
  display:flex;gap:0;overflow-x:auto;flex-shrink:0;
  border-bottom:1px solid var(--border);scrollbar-width:none;
}
#chat-room-tabs::-webkit-scrollbar{display:none;}
.chat-room-tab{
  padding:0.3rem 0.7rem;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--text-dim);
  font-size:0.7rem;font-family:'Cinzel',serif;letter-spacing:0.04em;
  cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;
}
.chat-room-tab:hover{color:var(--gold);}
.chat-room-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.chat-room-tab .tab-unread{
  background:var(--danger);color:#fff;border-radius:8px;
  font-size:0.58rem;padding:0.02rem 0.32rem;margin-left:0.2rem;display:none;
}
.chat-room-tab .tab-unread.visible{display:inline;}
#chat-send-row{
  display:flex;gap:0.4rem;padding:0.4rem 0.6rem;flex-shrink:0;
  border-top:1px solid var(--border);
}
#dm-chat-input{
  flex:1;background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;color:var(--text);font-size:0.8rem;
  padding:0.3rem 0.5rem;resize:none;font-family:inherit;
}
#dm-chat-input:focus{outline:none;border-color:var(--gold-dark);}
#dm-chat-send{
  background:var(--gold-dark);border:none;border-radius:4px;
  color:#fff;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.85rem;
  transition:background 0.15s;flex-shrink:0;
}
#dm-chat-send:hover{background:var(--gold);}
#dm-chat-send:disabled{opacity:0.5;cursor:default;}
#chat-section-header{
  padding:0.5rem 1rem;display:flex;align-items:center;justify-content:space-between;
  font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--text-dim);flex-shrink:0;cursor:pointer;
  border-bottom:1px solid var(--border);
}
#chat-section-header:hover{color:var(--gold);}
#chat-section-header .chat-unread{
  background:var(--danger);color:#fff;border-radius:10px;
  font-size:0.6rem;padding:0.05rem 0.4rem;display:none;
}
#chat-section-header .chat-unread.visible{display:inline;}
#chat-msgs-list{flex:1;overflow-y:auto;padding:0.35rem 0.75rem;display:flex;flex-direction:column;gap:0.3rem;}
#chat-msgs-list::-webkit-scrollbar{width:2px;}
#chat-msgs-list::-webkit-scrollbar-thumb{background:var(--border-bright);}
.dm-chat-msg{font-size:0.78rem;line-height:1.4;color:var(--text-mid);}
.dm-chat-msg .chat-author{color:var(--gold-dark);font-family:'Cinzel',serif;font-size:0.65rem;margin-right:0.35rem;}
.dm-chat-msg .chat-text{color:var(--text);}
#chat-section.collapsed #chat-msgs-list{display:none;}
#chat-section.collapsed #chat-room-tabs{display:none;}
#chat-section.collapsed #chat-send-row{display:none;}
#chat-section-chevron{transition:transform 0.2s;font-size:0.5rem;}
#chat-section.collapsed #chat-section-chevron{transform:rotate(-90deg);}
.dm-chat-msg.dm-own .chat-author{color:var(--gold);}

/* ── Initiative Tracker ── */
#init-bar{
  background:linear-gradient(180deg,rgba(18,14,8,0.98) 0%,rgba(10,10,16,0.97) 100%);
  border-top:2px solid var(--gold);
  border-bottom:2px solid var(--border-gold);
  overflow:hidden;transition:max-height 0.3s ease;
  box-shadow:0 6px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(232,201,106,0.08);
  position:sticky;top:0;z-index:200;
  flex-shrink:0;
}
#init-bar.collapsed{max-height:52px;}
#init-bar.open{max-height:220px;}
#init-header{
  display:flex;align-items:center;gap:0.65rem;
  padding:0 1.4rem;height:52px;flex-shrink:0;
  background:rgba(232,201,106,0.04);
  border-bottom:1px solid var(--border-gold);
}
#init-toggle{
  background:none;border:none;color:var(--gold);
  font-family:'Cinzel',serif;font-size:0.88rem;letter-spacing:0.1em;font-weight:600;
  display:flex;align-items:center;gap:0.5rem;padding:0;
  text-shadow:0 0 16px rgba(232,201,106,0.45);
}
#init-toggle:hover{color:var(--gold-dark);}
#init-toggle .arrow{transition:transform 0.2s;font-size:0.55rem;opacity:0.8;}
#init-bar.open #init-toggle .arrow{transform:rotate(90deg);}
.init-sep{width:1px;height:20px;background:var(--border-gold);opacity:0.5;}
.init-ctrl{
  background:rgba(232,201,106,0.06);border:1px solid var(--border-gold);color:var(--gold);
  width:30px;height:30px;border-radius:6px;font-size:0.85rem;
  display:flex;align-items:center;justify-content:center;transition:all 0.12s;
}
.init-ctrl:hover{color:#fff;border-color:var(--gold);background:rgba(232,201,106,0.18);box-shadow:0 0 10px rgba(232,201,106,0.25);}
#init-round-label{
  font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);
  padding:0.2rem 0.75rem;min-width:5rem;text-align:center;letter-spacing:0.08em;
  background:rgba(232,201,106,0.08);border:1px solid var(--border-gold);border-radius:6px;
}
#init-roll-all{
  background:rgba(232,201,106,0.12);border:1px solid var(--gold);color:var(--gold);
  font-size:0.76rem;padding:0.28rem 0.9rem;border-radius:6px;
  transition:all 0.15s;font-family:'Cinzel',serif;letter-spacing:0.05em;font-weight:600;
}
#init-roll-all:hover{background:rgba(232,201,106,0.22);box-shadow:0 0 16px rgba(232,201,106,0.2);color:#fff;}
#init-clear{color:var(--text-mid);font-size:0.72rem;padding:0.24rem 0.65rem;border-radius:6px;background:none;border:1px solid var(--border-bright);transition:all 0.12s;}
#init-clear:hover{color:var(--danger);border-color:var(--danger-bright);background:var(--danger-dim);}
#init-chips{display:flex;gap:0.65rem;padding:0.65rem 1.4rem 1rem;overflow-x:auto;flex-wrap:nowrap;}
#init-chips::-webkit-scrollbar{height:4px;}
#init-chips::-webkit-scrollbar-thumb{background:var(--border-gold);border-radius:2px;}
#init-chips::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);}
.init-chip{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border-bright);border-radius:10px;
  padding:0.6rem 0.85rem;min-width:78px;cursor:pointer;
  transition:all 0.15s;position:relative;flex-shrink:0;
}
.init-chip:hover{border-color:var(--border-gold);transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,0.5);}
.init-chip.active-turn{
  border-color:var(--gold);border-width:2px;
  background:rgba(232,201,106,0.12);
  box-shadow:0 0 0 3px rgba(232,201,106,0.12),0 0 24px rgba(232,201,106,0.2),0 6px 20px rgba(0,0,0,0.5);
}
.init-chip.active-turn::before{
  content:'▼';position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  font-size:0.62rem;color:var(--gold);text-shadow:0 0 10px var(--gold);
  animation:bounce-arrow 1s ease-in-out infinite;
}
@keyframes bounce-arrow{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-3px);}}
.init-chip.dead{opacity:0.25;filter:grayscale(1);}
.chip-avatar{font-size:1.3rem;line-height:1;}
.chip-name{font-size:0.66rem;color:var(--text-mid);white-space:nowrap;max-width:72px;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.02em;}
.init-chip.active-turn .chip-name{color:var(--gold);}
.chip-hp-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;width:100%;overflow:hidden;}
.chip-hp-fill{height:100%;border-radius:3px;transition:width 0.3s;}
.init-chip-inp{width:42px;background:rgba(0,0,0,0.5);border:1px solid var(--border-gold);color:var(--gold);border-radius:5px;padding:0.14rem 0.25rem;font-size:0.8rem;text-align:center;font-family:'Cinzel',serif;}
.init-chip-inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 8px rgba(232,201,106,0.2);}

/* ── Main ── */
#dm-main{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse 80% 40% at 60% 0%,rgba(70,80,140,0.04) 0%,transparent 60%),
    var(--bg);
}
#dm-main::-webkit-scrollbar{width:5px;}
#dm-main::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px;}
#panels-area{flex:1;padding:1.25rem;display:flex;flex-direction:column;gap:1.5rem;}
.panels-section-header{
  display:flex;align-items:center;gap:0.6rem;
  margin-bottom:0.85rem;padding-bottom:0.55rem;
  border-bottom:1px solid var(--border-bright);
}
.panels-section-icon{font-size:0.95rem;opacity:0.8;}
.panels-section-label{
  font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--gold);
}
.monster-section-header .panels-section-label{color:var(--danger);}
.panels-section-count{
  margin-left:auto;font-size:0.65rem;color:var(--text-dim);
  background:var(--border-bright);border-radius:10px;
  padding:0.1rem 0.5rem;font-family:'Cinzel',serif;letter-spacing:0.05em;
}
#player-panels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.1rem;}
#monster-panels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.1rem;}
body.compact #player-panels-grid,body.compact #monster-panels-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:0.7rem;}

/* Empty state */
#empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;color:var(--text-dim);text-align:center;gap:0.75rem;padding:3rem;min-height:300px;
}
#empty-state .empty-icon{
  font-size:3.5rem;margin-bottom:0.5rem;
  filter:drop-shadow(0 0 20px rgba(232,201,106,0.08));
  opacity:0.25;
}
#empty-state p{font-size:0.85rem;line-height:1.7;max-width:300px;color:var(--text-dim);}

/* ── Combat Panel ── */
.combat-panel{
  background:var(--bg-card);
  border:1px solid var(--border-bright);
  border-radius:10px;overflow:hidden;
  box-shadow:var(--shadow);
  transition:all 0.2s;
}
.combat-panel:hover{
  border-color:var(--border-gold);
  box-shadow:0 6px 28px rgba(0,0,0,0.6),0 0 0 1px rgba(232,201,106,0.06);
  transform:translateY(-1px);
}
.combat-panel.monster-panel{border-color:rgba(217,64,64,0.25);}
.combat-panel.monster-panel:hover{border-color:rgba(217,64,64,0.5);box-shadow:0 6px 28px rgba(0,0,0,0.6),0 0 16px rgba(217,64,64,0.06);}
.combat-panel.hp-alert{animation:hp-flash 0.7s ease 3;}
@keyframes hp-flash{
  0%,100%{border-color:var(--danger);box-shadow:0 0 24px rgba(217,64,64,0.3);}
  50%{border-color:rgba(217,64,64,0.3);box-shadow:none;}
}

/* Panel header */
.panel-header{
  display:flex;align-items:center;gap:0.6rem;padding:0.7rem 0.9rem;
  background:linear-gradient(135deg,#1a1c28 0%,#141620 100%);
  border-bottom:1px solid var(--border-bright);
  position:relative;
}
.panel-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,201,106,0.1),transparent);
}
.monster-panel .panel-header{background:linear-gradient(135deg,rgba(100,15,10,0.8) 0%,rgba(60,10,8,0.6) 100%);}
.panel-avatar{font-size:1.2rem;width:26px;text-align:center;flex-shrink:0;}
.panel-title{flex:1;min-width:0;}
.panel-char-name{font-family:'Cinzel',serif;color:var(--gold);font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.03em;}
.panel-char-sub{font-size:0.67rem;color:var(--text-dim);margin-top:2px;font-style:italic;}
.panel-acts{display:flex;gap:0.3rem;flex-shrink:0;}
.pact{
  background:rgba(255,255,255,0.04);border:1px solid var(--border-bright);color:var(--text-dim);
  width:26px;height:26px;border-radius:5px;font-size:0.7rem;
  display:flex;align-items:center;justify-content:center;transition:all 0.12s;
}
.pact:hover{color:var(--gold);border-color:var(--border-gold);background:var(--gold-glow);}
.pact.danger:hover{color:var(--danger);border-color:var(--danger-bright);background:var(--danger-dim);}
.pact.rest-long{font-size:0.58rem;width:auto;padding:0 0.45rem;}
.pact.rest-long:hover{color:var(--heal);border-color:rgba(61,184,122,0.4);background:var(--heal-dim);}

/* HP section */
.panel-hp{padding:0.75rem 0.9rem;border-bottom:1px solid var(--border);}
.hp-bar-wrap{height:10px;background:rgba(0,0,0,0.4);border-radius:5px;overflow:hidden;margin-bottom:0.6rem;border:1px solid var(--border);}
.hp-bar-fill{height:100%;border-radius:5px;transition:width 0.4s,background 0.4s;}
.hp-row{display:flex;align-items:baseline;gap:0.5rem;margin-bottom:0.55rem;}
.hp-num{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--text);}
.hp-sep{color:var(--text-dim);font-size:0.85rem;}
.hp-max{color:var(--text-dim);font-size:0.8rem;}
.hp-temp-badge{font-size:0.7rem;color:var(--gold);background:var(--gold-glow);border:1px solid var(--border-gold);border-radius:4px;padding:0.06rem 0.4rem;}
.hp-controls{display:flex;gap:0.35rem;align-items:center;margin-bottom:0.4rem;}
.hp-qbtn{
  background:rgba(255,255,255,0.04);border:1px solid var(--border-bright);color:var(--text-mid);
  padding:0.26rem 0.55rem;border-radius:5px;font-size:0.74rem;transition:all 0.12s;font-weight:600;
}
.hp-qbtn.m:hover{background:var(--danger-dim);border-color:var(--danger-bright);color:var(--danger);}
.hp-qbtn.p:hover{background:var(--heal-dim);border-color:rgba(61,184,122,0.4);color:var(--heal);}
.hp-inp{
  flex:1;background:rgba(0,0,0,0.35);border:1px solid var(--border-bright);color:var(--text);
  padding:0.26rem 0.45rem;border-radius:5px;font-size:0.85rem;text-align:center;min-width:0;transition:border-color 0.15s;
}
.hp-inp:focus{outline:none;border-color:var(--gold-dim);}
.hp-apply{
  background:linear-gradient(135deg,var(--gold-dark) 0%,var(--gold-dim) 100%);
  border:1px solid rgba(232,201,106,0.3);color:#fff;padding:0.26rem 0.7rem;
  border-radius:5px;font-size:0.7rem;font-family:'Cinzel',serif;letter-spacing:0.04em;transition:all 0.15s;
}
.hp-apply:hover{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);box-shadow:0 0 10px rgba(232,201,106,0.15);}
.temp-row{display:flex;align-items:center;gap:0.4rem;}

<script>
/* ══════════════════════════════════════════
   Config
══════════════════════════════════════════ */
const SB_URL  = 'https://hevwgdsvgepiieuvhclg.supabase.co';
const SB_KEY  = 'sb_publishable_TDTCogCSFP-Lvus2x3rAAg_60l036tq';
const SB_HDR  = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
const ADMIN_USER = 'dm';
const POLL_MS = 10000;
const ALL_CONDITIONS = [
  'Blinded','Charmed','Deafened','Frightened','Grappled',
  'Incapacitated','Invisible','Poisoned','Prone',
  'Restrained','Stunned','Unconscious','Concentrating'
];

/* ══════════════════════════════════════════
   State
══════════════════════════════════════════ */
let currentUser    = null;
let allPlayers     = [];
let openPanels     = {};       // key → {type:'player'|'monster', username?, charId?, monsterId?}
let expandedPlayers= new Set();
let localMonsters  = {};       // id → {id,name,avatar,hpMax,hp,ac,initiative,conditions}
let monsterCounter = 0;
let pollTimer      = null;
let saveTimers     = {};
let compactMode    = false;
let prevHp         = {};       // key → pvActuel, for 0-HP detection

// Initiative tracker state
let initState = {
  open: false,
  combatants: [],  // [{id, label, avatar, type, ref, initVal, hp, hpMax}]
  currentIdx: -1,
  round: 1
};

/* ══════════════════════════════════════════
   Persistance localStorage
══════════════════════════════════════════ */
const DM_STATE_KEY = 'kaleysur-dm-v1';

function saveDmState() {
  try {
    localStorage.setItem(DM_STATE_KEY, JSON.stringify({
      localMonsters,
      monsterCounter,
      openPanels,
      expandedPlayers: [...expandedPlayers],
      compactMode,
      initState
    }));
  } catch(e) {}
}

function restoreDmState() {
  try {
    const raw = localStorage.getItem(DM_STATE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.localMonsters)   localMonsters   = s.localMonsters;
    if (s.monsterCounter != null) monsterCounter = s.monsterCounter;
    if (s.expandedPlayers) expandedPlayers = new Set(s.expandedPlayers);
    if (typeof s.compactMode === 'boolean') {
      compactMode = s.compactMode;
      document.body.classList.toggle('compact', compactMode);
      document.getElementById('btn-compact')?.classList.toggle('active', compactMode);
    }
    if (s.initState) {
      Object.assign(initState, s.initState);
      document.getElementById('init-bar').className = initState.open ? 'open' : 'collapsed';
      document.getElementById('btn-init-open')?.classList.toggle('active', initState.open);
      document.getElementById('init-round-label').textContent = 'Tour ' + (initState.round || 1);
    }
    // Re-ouvrir les panels
    if (s.openPanels) {
      for (const key of Object.keys(s.openPanels)) {
        openPanels[key] = s.openPanels[key];
        const type = key.startsWith('m::') ? 'monster' : 'player';
        if (document.getElementById('panel-' + key)) continue;
        const gridId = type === 'monster' ? 'monster-panels-grid' : 'player-panels-grid';
        const el = document.createElement('div');
        el.className = 'combat-panel' + (type === 'monster' ? ' monster-panel' : '');
        el.id = 'panel-' + key;
        document.getElementById(gridId).appendChild(el);
        updatePanel(key);
      }
      updateEmptyState();
    }
    renderSidebar();
    renderMonsterSidebar();
    renderInitChips();
  } catch(e) {}
}

/* ══════════════════════════════════════════
   Supabase
══════════════════════════════════════════ */
async function sbFetch(path, opts={}) {
  return fetch(SB_URL + path, { ...opts, headers: { ...SB_HDR, ...(opts.headers||{}) } });
}
async function hashPwd(pwd) {
  const d = new TextEncoder().encode(pwd + ':kaleysur_v3');
  const h = await crypto.subtle.digest('SHA-256', d);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function sbGetPlayer(username) {
  const r = await sbFetch(`/rest/v1/players?username=eq.${encodeURIComponent(username)}&select=*`);
  return (await r.json())[0] || null;
}
async function sbGetAllPlayers() {
  const r = await sbFetch('/rest/v1/players?select=username,data&order=username.asc');
  if (!r.ok) return [];
  return r.json();
}
async function sbUpdateData(username, data) {
  return sbFetch(`/rest/v1/players?username=eq.${encodeURIComponent(username)}`, {
    method:'PATCH', headers:{'Prefer':'return=minimal'}, body: JSON.stringify({data})
  });
}

/* ══════════════════════════════════════════
   Session / Auth
══════════════════════════════════════════ */
function saveSession(u) { localStorage.setItem('kaleysur_dm_user', u); }
function loadSession()  { return localStorage.getItem('kaleysur_dm_user'); }
function clearSession() { localStorage.removeItem('kaleysur_dm_user'); }

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('auth-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const btn  = document.getElementById('btn-login');
  const user = document.getElementById('auth-user').value.trim().toLowerCase();
  const pass = document.getElementById('auth-pass').value;
  const err  = document.getElementById('auth-error');
  err.textContent = '';
  if (!user || !pass) { err.textContent = 'Identifiant et mot de passe requis.'; return; }
  btn.textContent = '…'; btn.disabled = true;
  try {
    const row = await sbGetPlayer(user);
    if (!row) throw new Error('Utilisateur inconnu.');
    const h = await hashPwd(pass);
    if (h !== row.password_hash) throw new Error('Mot de passe incorrect.');
    currentUser = user;
    saveSession(user);
    enterDM();
  } catch(e) {
    err.textContent = e.message;
  } finally {
    btn.textContent = 'Entrer'; btn.disabled = false;
  }
}

async function enterDM() {
  document.getElementById('screen-auth').style.display = 'none';
  document.getElementById('screen-dm').style.display   = 'block';
  await refreshAllPlayers();
  restoreDmState();
  startRealtime();
  renderChatRoomTabs();
  loadDmChat();
  startDmChatRealtime();
  // Polling de secours toutes les 60s si Realtime déconnecté
  pollTimer = setInterval(pollPlayers, 60000);
}

document.getElementById('btn-logout').addEventListener('click', () => {
  clearInterval(pollTimer);
  clearSession();
  location.reload();
});

/* ══════════════════════════════════════════
   Realtime
══════════════════════════════════════════ */
function startRealtime() {
  if (!window.supabase) return;
  try {
    const client = window.supabase.createClient(SB_URL, SB_KEY);
    client.channel('dm-players-sync')
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'players'
      }, payload => {
        const row = payload.new;
        if (!row?.username || !row?.data) return;
        // Mettre à jour allPlayers en mémoire
        const idx = allPlayers.findIndex(p => p.username === row.username);
        if (idx !== -1) allPlayers[idx].data = row.data;
        else allPlayers.push({ username: row.username, data: row.data });
        // Ne re-render que les panels du joueur modifié
        renderSidebar();
        Object.keys(openPanels).filter(k => k.startsWith('p::' + row.username + '::')).forEach(k => updatePanel(k));
        renderInitChips();
        document.getElementById('poll-indicator').textContent =
          '⚡ ' + new Date().toLocaleTimeString('fr', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      })
      .subscribe(status => {
        if (status === 'SUBSCRIBED') {
          document.getElementById('poll-indicator').textContent = '⚡ Realtime';
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          document.getElementById('poll-indicator').textContent = '⚠ Polling';
        }
      });
  } catch(e) {
    console.warn('Realtime non disponible, polling actif', e);
  }
}

}
async function pollPlayers() { await refreshAllPlayers(); }
document.getElementById('btn-refresh').addEventListener('click', refreshAllPlayers);

document.getElementById('player-search').addEventListener('input', renderSidebar);

function renderSidebar() {
  const q = document.getElementById('player-search').value.trim().toLowerCase();
  const list = document.getElementById('player-list');
  const filtered = allPlayers.filter(p => p.username !== ADMIN_USER && p.username.includes(q));

  if (!filtered.length) { list.innerHTML = '<div class="loading">Aucun joueur.</div>'; return; }

  list.innerHTML = '';
  filtered.forEach(player => {
    const data     = player.data || {};
    const chars    = Object.entries(data.characters || {});
    const avatar   = data.avatar || '⚔';
    const expanded = expandedPlayers.has(player.username);

    const activeId   = data.activeCharId;
    const activeChar = activeId ? data.characters?.[activeId]?.character : null;
    const hpPct = activeChar
      ? Math.max(0, Math.min(100, (activeChar.pvActuel||0) / Math.max(1, activeChar.pvMax||1) * 100))
      : 0;

    const item = document.createElement('div');
    item.className = 'player-item' + (expanded ? ' expanded' : '');
    item.dataset.username = player.username;
    item.innerHTML = `
      <div class="player-head">
        <span class="player-avatar">${avatar}</span>
        <div class="player-info">
          <div class="player-name">${esc(player.username)}</div>
          <div class="player-hp-mini"><div class="player-hp-mini-bar" style="width:${hpPct}%;background:${hpColor(hpPct)};"></div></div>
        </div>
        <span class="player-expand-icon">▶</span>
      </div>
      <div class="char-list">
        ${chars.map(([cid, slot]) => {
          const key   = 'p::' + player.username + '::' + cid;
          const isOpen = !!openPanels[key];
          const c     = slot.character || {};
          const sub   = [c.classe, c.niveau ? 'niv.'+c.niveau : ''].filter(Boolean).join(' ');
          return `<div class="char-entry${isOpen?' open':''}" data-key="${esc(key)}">
            <span class="char-dot"></span>
            <span>${esc(slot.name||'Personnage')}</span>
            ${sub ? `<span style="font-size:0.66rem;color:var(--text-dim);margin-left:auto;">${esc(sub)}</span>` : ''}
          </div>`;
        }).join('')}
        ${!chars.length ? '<div style="font-size:0.72rem;color:var(--text-dim);">Aucun personnage</div>' : ''}
      </div>`;

    item.querySelector('.player-head').addEventListener('click', () => {
      if (expandedPlayers.has(player.username)) expandedPlayers.delete(player.username);
      else expandedPlayers.add(player.username);
      renderSidebar();
      saveDmState();
    });
    item.querySelectorAll('.char-entry').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        togglePanel(el.dataset.key);
      });
    });
    list.appendChild(item);
  });
}

document.getElementById('btn-add-monster').addEventListener('click', () => {
  const f = document.getElementById('monster-form');
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById('mf-name').focus();
});

document.getElementById('btn-create-monster').addEventListener('click', createMonster);
document.getElementById('mf-hp').addEventListener('keydown', e => { if(e.key==='Enter') createMonster(); });

function createMonster() {
  const name  = document.getElementById('mf-name').value.trim();
  const hp    = parseInt(document.getElementById('mf-hp').value) || 1;
  const ac    = parseInt(document.getElementById('mf-ac').value) || 10;
  const init  = parseInt(document.getElementById('mf-init').value) || 0;
  const avatar= document.getElementById('mf-avatar').value.trim() || '👹';
  if (!name) { document.getElementById('mf-name').focus(); return; }

  const id = 'monster-' + (++monsterCounter);
  localMonsters[id] = { id, name, avatar, hpMax:hp, hp, ac, initiative:init, conditions:[] };

  ['mf-name','mf-hp','mf-ac','mf-init','mf-avatar'].forEach(i => { document.getElementById(i).value = ''; });
  document.getElementById('monster-form').classList.remove('open');

  renderMonsterSidebar();
  openPanel('m::' + id);
  // Auto-ajout à l'initiative
  const initVal = Math.floor(Math.random() * 20) + 1 + (parseInt(init) || 0);
  initState.combatants.push({ id: 'm::' + id, label: name, avatar, type: 'monster', initVal, hp, hpMax: hp, delayed: false });
  initState.combatants.sort((a, b) => b.initVal - a.initVal);
  if (!initState.open) {
    initState.open = true;
    document.getElementById('init-bar').className = 'open';
    document.getElementById('btn-init-open').classList.add('active');
  }
  renderInitChips();
  saveDmState();
}

function renderMonsterSidebar() {
  const list = document.getElementById('monster-list');
  const ids  = Object.keys(localMonsters);
  list.innerHTML = ids.map(id => {
    const m   = localMonsters[id];
    const key = 'm::' + id;
    const isOpen = !!openPanels[key];
    return `<div class="monster-sidebar-entry${isOpen?' open':''}" data-mkey="${esc(key)}">
      <span class="m-dot"></span>
      <span>${m.avatar} ${esc(m.name)}</span>
      <span style="margin-left:auto;font-size:0.68rem;">${m.hp}/${m.hpMax}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('[data-mkey]').forEach(el => {
    el.addEventListener('click', () => togglePanel(el.dataset.mkey));
  });
}

/* ══════════════════════════════════════════
   Panel management
══════════════════════════════════════════ */
function togglePanel(key) {
  if (openPanels[key]) closePanel(key);
  else openPanel(key);
}

function openPanel(key) {
  const type = key.startsWith('m::') ? 'monster' : 'player';
  openPanels[key] = { type, key };
  const gridId = type === 'monster' ? 'monster-panels-grid' : 'player-panels-grid';
  const grid = document.getElementById(gridId);
  const el   = document.createElement('div');
  el.className = 'combat-panel' + (type === 'monster' ? ' monster-panel' : '');
  el.id = 'panel-' + key;
  grid.appendChild(el);
  updatePanel(key);
  renderSidebar();
  renderMonsterSidebar();
  updateEmptyState();
  saveDmState();
  // Sur tablette, fermer la sidebar pour voir le panneau
  if (window.innerWidth <= 1024) closeSidebar();
}

function closePanel(key) {
  delete openPanels[key];
  document.getElementById('panel-' + key)?.remove();
  renderSidebar();
  renderMonsterSidebar();
  updateEmptyState();
  saveDmState();
}

function updateEmptyState() {
  const keys = Object.keys(openPanels);
  const playerKeys  = keys.filter(k => !k.startsWith('m::'));
  const monsterKeys = keys.filter(k =>  k.startsWith('m::'));
  document.getElementById('empty-state').style.display = keys.length ? 'none' : '';
  document.getElementById('player-panels-section').style.display  = playerKeys.length  ? '' : 'none';
  document.getElementById('monster-panels-section').style.display = monsterKeys.length ? '' : 'none';
  document.getElementById('player-panels-count').textContent  = playerKeys.length  || '';
  document.getElementById('monster-panels-count').textContent = monsterKeys.length || '';
}

function refreshOpenPanels() {
  Object.keys(openPanels).forEach(key => updatePanel(key));
}

/* ══════════════════════════════════════════
   Panel rendering
══════════════════════════════════════════ */
function updatePanel(key) {
  const panel = document.getElementById('panel-' + key);
  if (!panel) return;
  if (key.startsWith('m::')) renderMonsterPanel(panel, key);
  else renderPlayerPanel(panel, key);
}

/* ── Player panel ── */
function renderPlayerPanel(panel, key) {
  const parts    = key.split('::'); // ['p', username, charId]
  const username = parts[1];
  const charId   = parts[2];
  const pData    = allPlayers.find(p => p.username === username)?.data || {};
  const slot     = pData?.characters?.[charId];
  const c        = slot?.character || {};
  const charName = slot?.name || 'Inconnu';
  const avatar   = pData?.avatar || '⚔';
  const sub      = [c.classe, c.niveau ? 'Niv.'+c.niveau : '', c.species].filter(Boolean).join(' · ');

  const pvMax  = parseInt(c.pvMax)    || 0;
  const pvAct  = parseInt(c.pvActuel) || 0;
  const pvTemp = parseInt(c.pvTemp)   || 0;
  const pct    = pvMax > 0 ? Math.max(0, Math.min(100, pvAct / pvMax * 100)) : 0;
  const dead   = pvAct <= 0 && pvMax > 0;
  const succ   = Math.min(3, parseInt(c.mortSucces) || 0);
  const fail   = Math.min(3, parseInt(c.mortEchecs) || 0);

  // 0-HP flash detection
  const prev = prevHp[key];
  if (prev !== undefined && prev > 0 && pvAct === 0) {
    panel.classList.remove('hp-alert');
    void panel.offsetWidth;
    panel.classList.add('hp-alert');
  }
  prevHp[key] = pvAct;

  // Spell slots
  const slots  = c.emplacementsSort || {};
  const used   = c.emplacementsUtilises || {};
  const hasSlots = Object.values(slots).some(v => v > 0);

  panel.innerHTML = `
    <div class="panel-header">
      <span class="panel-avatar">${avatar}</span>
      <div class="panel-title">
        <div class="panel-char-name">${esc(charName)}</div>
        ${sub ? `<div class="panel-char-sub">${esc(sub)}</div>` : ''}
      </div>
      <div class="panel-acts">
        <button class="pact${c.inspiration?' insp-on':''}" data-insp="${esc(key)}" title="Inspiration">⭐</button>
        <button class="pact rest-long" data-key="${esc(key)}" title="Repos long">☀ Long</button>
        <button class="pact danger" data-close="${esc(key)}" title="Fermer">✕</button>
      </div>
    </div>

    <div class="panel-hp">
      <div class="hp-bar-wrap"><div class="hp-bar-fill" style="width:${pct}%;background:${hpColor(pct)};"></div></div>
      <div class="hp-row">
        <span class="hp-num" style="color:${dead?'var(--danger)':'var(--text)'};">${pvAct}</span>
        <span class="hp-max">/ ${pvMax} HP</span>
        ${pvTemp > 0 ? `<span class="hp-temp-badge">+${pvTemp} temp</span>` : ''}
        ${dead ? `<span style="color:var(--danger);font-size:0.72rem;margin-left:auto;">💀 À terre</span>` : ''}
      </div>
      <div class="hp-controls">
        <button class="hp-qbtn m" data-delta="-10">−10</button>
        <button class="hp-qbtn m" data-delta="-5">−5</button>
        <button class="hp-qbtn m" data-delta="-1">−1</button>
        <input type="number" class="hp-inp" placeholder="±HP" id="hpinp-${esc(key)}">
        <button class="hp-qbtn p" data-delta="+1">+1</button>
        <button class="hp-qbtn p" data-delta="+5">+5</button>
        <button class="hp-apply" data-apply="${esc(key)}">✓</button>
      </div>
      <div class="temp-row">
        <span class="temp-label">Temp HP</span>
        <input type="number" class="temp-inp" id="tempinp-${esc(key)}" value="${pvTemp}" min="0">
        <button class="temp-set" data-temp="${esc(key)}">Définir</button>
      </div>
      ${dead ? `<div class="death-row">
        Jets de mort :
        ${[0,1,2].map(i=>`<span class="ds-dot${i<succ?' s':''}" data-ds="s" data-i="${i}" title="Succès ${i+1}"></span>`).join('')}
        <span class="ds-sep"></span>
        ${[0,1,2].map(i=>`<span class="ds-dot${i<fail?' f':''}" data-ds="f" data-i="${i}" title="Échec ${i+1}"></span>`).join('')}
      </div>` : ''}
    </div>

    <div class="panel-stats">
      <div class="stat-cell"><div class="stat-val">${c.ca ?? '—'}</div><div class="stat-lbl">CA</div></div>
      <div class="stat-cell"><div class="stat-val">${fmtInit(c.initiative)}</div><div class="stat-lbl">Init.</div></div>
      <div class="stat-cell"><div class="stat-val">${c.vitesse ?? '—'}m</div><div class="stat-lbl">Vitesse</div></div>
      ${c.inspiration ? `<div class="stat-cell"><div class="stat-val" style="color:#f0d060;">⭐</div><div class="stat-lbl">Inspi.</div></div>` : ''}
      ${c.concentration ? `<div class="stat-cell"><div class="stat-val" style="font-size:0.7rem;">🎯</div><div class="stat-lbl" style="color:#a080e0;">${esc(String(c.concentration).slice(0,8))}</div></div>` : ''}
    </div>

    ${(Array.isArray(c.ressources) && c.ressources.length) ? `<div class="panel-res">
      ${c.ressources.map((r,ri) => {
        const max = parseInt(r.max)||0;
        const act = parseInt(r.actuel)||0;
        return `<div class="res-row">
          <span class="res-name">${esc(r.name||r.nom||'Ressource')}</span>
          <span class="res-pips">${Array.from({length:max},(_,pi)=>`<span class="res-pip${pi<act?' used':''}" data-res-key="${esc(key)}" data-res-i="${ri}" data-res-pip="${pi}"></span>`).join('')}</span>
          <span style="font-size:0.72rem;color:var(--text-dim);margin-left:0.3rem;">${act}/${max}</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${hasSlots ? `<div class="panel-slots">
      <button class="slots-toggle" id="slotbtn-${esc(key)}"><span class="arrow">▶</span> Sorts</button>
      <div class="slots-grid" id="slotgrid-${esc(key)}">
        ${[1,2,3,4,5,6,7,8,9].map(n => {
          const max = parseInt(slots[n]) || 0;
          const u   = parseInt(used[n])  || 0;
          const rem = Math.max(0, max - u);
          return `<div class="slot-cell">
            <div class="slot-niv">${n}</div>
            <div class="slot-count${rem===0?' empty':''}">${max>0 ? rem+'/'+max : '—'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <div class="panel-cond">
      <div class="sec-label">Conditions</div>
      <div class="cond-badges">
        ${(Array.isArray(c.conditions) ? c.conditions : []).map(cond =>
          `<span class="cond-badge" data-remove-cond="${esc(cond)}" title="Retirer">${esc(cond)} <span class="cond-x">✕</span></span>`
        ).join('')}
        <div class="cond-picker">
          <button class="cond-add-btn">+ Condition</button>
          <div class="cond-menu" id="cmenu-${esc(key)}">
            ${ALL_CONDITIONS.filter(co => !(c.conditions||[]).includes(co)).map(co =>
              `<div class="cond-opt" data-add-cond="${esc(co)}">${esc(co)}</div>`
            ).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="panel-dm-notes">
      <div class="dm-notes-label">🗒 Notes DM (local)</div>
      <textarea class="dm-notes-inp" data-dm-notes="${esc(key)}" rows="2" placeholder="Notes privées…">${esc(_panelNotes[key]||'')}</textarea>
    </div>`;

  attachPlayerPanelEvents(panel, key, username, charId);
}

const _panelNotes = {};

function attachPlayerPanelEvents(panel, key, username, charId) {
  panel.querySelector('[data-close]')?.addEventListener('click', () => closePanel(key));

  // Inspiration toggle
  panel.querySelector('[data-insp]')?.addEventListener('click', () => {
    const data = getPlayerData(username);
    if (!data) return;
    const c = data.characters?.[charId]?.character;
    if (!c) return;
    c.inspiration = !c.inspiration;
    updatePanel(key);
    schedulePlayerSave(username, data);
  });

  // Ressources pips
  panel.querySelectorAll('.res-pip').forEach(pip => {
    pip.addEventListener('click', () => {
      const data = getPlayerData(username);
      if (!data) return;
      const c = data.characters?.[charId]?.character;
      if (!c || !Array.isArray(c.ressources)) return;
      const ri  = parseInt(pip.dataset.resI);
      const pi  = parseInt(pip.dataset.resPip);
      const res = c.ressources[ri];
      if (!res) return;
      const cur = parseInt(res.actuel) || 0;
      res.actuel = (pi < cur) ? pi : pi + 1;
      updatePanel(key);
      schedulePlayerSave(username, data);
    });
  });

  // Notes DM locales
  panel.querySelector('[data-dm-notes]')?.addEventListener('input', e => {
    _panelNotes[key] = e.target.value;
  });

  panel.querySelector('[data-key].rest-long')?.addEventListener('click', () => longRest(username, charId, key));

  panel.querySelectorAll('.hp-qbtn').forEach(btn => {
    btn.addEventListener('click', () => applyHpDelta(username, charId, key, parseInt(btn.dataset.delta)));
  });

  panel.querySelector('[data-apply]')?.addEventListener('click', () => {
    const inp = document.getElementById('hpinp-' + key);
    const v   = parseInt(inp?.value);
    if (!isNaN(v) && v !== 0) { applyHpDelta(username, charId, key, v); if(inp) inp.value=''; }
  });
  panel.querySelector('.hp-inp')?.addEventListener('keydown', e => {
    if(e.key==='Enter') panel.querySelector('[data-apply]')?.click();
  });

  panel.querySelector('[data-temp]')?.addEventListener('click', () => {
    const inp = document.getElementById('tempinp-' + key);
    const v   = Math.max(0, parseInt(inp?.value) || 0);
    const data = getPlayerData(username);
    if (!data) return;
    const c = data.characters?.[charId]?.character;
    if (!c) return;
    c.pvTemp = v;
    updatePanel(key);
    schedulePlayerSave(username, data);
  });

  // Death saves
  panel.querySelectorAll('.ds-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const type = dot.dataset.ds;
      const i    = parseInt(dot.dataset.i);
      const data = getPlayerData(username);
      if (!data) return;
      const c = data.characters?.[charId]?.character;
      if (!c) return;
      const field = type === 's' ? 'mortSucces' : 'mortEchecs';
      const cur   = Math.min(3, parseInt(c[field]) || 0);
      // toggle: if clicking index < cur → reduce, else → increase
      c[field] = (i < cur) ? i : i + 1;
      updatePanel(key);
      schedulePlayerSave(username, data);
    });
  });

  // Spell slot toggle
  const slotBtn = panel.querySelector('.slots-toggle');
  if (slotBtn) {
    slotBtn.addEventListener('click', () => slotBtn.classList.toggle('open'));
  }

  // Conditions
  panel.querySelectorAll('[data-remove-cond]').forEach(el => {
    el.addEventListener('click', () => playerCondition(username, charId, key, el.dataset.removeCond, false));
  });
  panel.querySelectorAll('.cond-add-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      closeAllMenus();
      document.getElementById('cmenu-' + key)?.classList.add('open');
    });
  });
  panel.querySelectorAll('[data-add-cond]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('cmenu-' + key)?.classList.remove('open');
      playerCondition(username, charId, key, el.dataset.addCond, true);
    });
  });
}

/* ── Monster panel ── */
function renderMonsterPanel(panel, key) {
  const id = key.replace('m::', '');
  const m  = localMonsters[id];
  if (!m) { panel.remove(); delete openPanels[key]; updateEmptyState(); return; }

        <button class="hp-qbtn p" data-delta="+5">+5</button>
        <button class="hp-apply" data-apply="${esc(key)}">✓</button>
      </div>
    </div>
    <div class="panel-stats">
      <div class="stat-cell"><div class="stat-val">${m.ac}</div><div class="stat-lbl">CA</div></div>
      <div class="stat-cell"><div class="stat-val">${fmtInit(m.initiative)}</div><div class="stat-lbl">Init.</div></div>
      <div class="stat-cell">
        <input type="number" class="hp-inp" id="maxhp-${esc(key)}" value="${m.hpMax}" style="width:55px;margin:0 auto;" title="HP Max">
        <div class="stat-lbl">HP Max</div>
      </div>
    </div>
    <div class="panel-cond">
      <div class="sec-label">Conditions</div>
      <div class="cond-badges">
        ${m.conditions.map(cond =>
          `<span class="cond-badge" data-remove-cond="${esc(cond)}">${esc(cond)} <span class="cond-x">✕</span></span>`
        ).join('')}
        <div class="cond-picker">
          <button class="cond-add-btn">+ Condition</button>
          <div class="cond-menu" id="cmenu-${esc(key)}">

  panel.querySelector('[data-clone]')?.addEventListener('click', () => {
    const newId = 'monster-' + (++monsterCounter);

    renderMonsterSidebar();
    openPanel('m::' + newId);

    initState.combatants.sort((a, b) => b.initVal - a.initVal);
    renderInitChips();

    closePanel(key);
    renderMonsterSidebar();
    removeInitCombatant(key);
    saveDmState();
  });

  panel.querySelectorAll('.hp-qbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      m.hp = Math.max(0, Math.min(m.hpMax, m.hp + parseInt(btn.dataset.delta)));

/* ══════════════════════════════════════════
   Mutations — Players
══════════════════════════════════════════ */
function getPlayerData(username) {
  return allPlayers.find(p => p.username === username)?.data || null;
}

function applyHpDelta(username, charId, key, delta) {
  const data = getPlayerData(username);
  if (!data) return;
  const c = data.characters?.[charId]?.character;
  if (!c) return;
  const max = parseInt(c.pvMax) || 0;
  c.pvActuel = Math.max(0, Math.min(max, (parseInt(c.pvActuel)||0) + delta));
  updatePanel(key);
  renderInitChips();
  schedulePlayerSave(username, data);
}

function playerCondition(username, charId, key, cond, add) {
  const data = getPlayerData(username);
  if (!data) return;
  const c = data.characters?.[charId]?.character;
  if (!c) return;
  c.conditions = Array.isArray(c.conditions) ? c.conditions : [];
  if (add && !c.conditions.includes(cond)) c.conditions.push(cond);
  if (!add) c.conditions = c.conditions.filter(x => x !== cond);
  updatePanel(key);
  schedulePlayerSave(username, data);
}

function longRest(username, charId, key) {
  const data = getPlayerData(username);
  if (!data) return;
  const c = data.characters?.[charId]?.character;
  if (!c) return;
  c.pvActuel = parseInt(c.pvMax) || 0;
  c.pvTemp   = 0;
  c.mortSucces = 0;
  c.mortEchecs = 0;
  // Reset spell slots
  const max = c.emplacementsSort || {};
  c.emplacementsUtilises = {};
  for (let i = 1; i <= 9; i++) c.emplacementsUtilises[i] = 0;
  // Reset resources
  if (Array.isArray(c.resources)) {
    c.resources.forEach(r => { if (r.recharge === 'long') r.used = 0; });
  }
  updatePanel(key);
  renderInitChips();
  schedulePlayerSave(username, data);
}

function schedulePlayerSave(username, data) {
  clearTimeout(saveTimers[username]);
  saveTimers[username] = setTimeout(() => sbUpdateData(username, data), 800);
}

document.getElementById('btn-init-open').addEventListener('click', () => {

  document.getElementById('btn-init-open').classList.toggle('active', initState.open);

});
document.getElementById('init-toggle').addEventListener('click', () => {

document.getElementById('init-next').addEventListener('click', () => {
  if (!initState.combatants.length) return;
  let next = (initState.currentIdx + 1) % initState.combatants.length;
  let guard = 0;
  while (initState.combatants[next]?.delayed && guard++ < initState.combatants.length) {
    next = (next + 1) % initState.combatants.length;
  }
  if (next <= initState.currentIdx && next !== initState.currentIdx) initState.round++;
  initState.currentIdx = next;
  document.getElementById('init-round-label').textContent = 'Tour ' + initState.round;
  renderInitChips();
  saveDmState();
});
document.getElementById('init-prev').addEventListener('click', () => {
  if (!initState.combatants.length) return;
  if (initState.currentIdx === 0) { initState.round = Math.max(1, initState.round - 1); }
  initState.currentIdx = (initState.currentIdx - 1 + initState.combatants.length) % initState.combatants.length;
  document.getElementById('init-round-label').textContent = 'Tour ' + initState.round;
  renderInitChips();
  saveDmState();
});
document.getElementById('init-roll-all').addEventListener('click', () => {

    initState.open = true;

});

  initState.round = 1;
  document.getElementById('init-round-label').textContent = 'Tour 1';
  renderInitChips();
  saveDmState();
});

function buildInitCombatants(roll = false) {
  initState.combatants = [];

  // Players with open panels
  allPlayers.forEach(player => {
    if (player.username === ADMIN_USER) return;
    const data = player.data || {};
    Object.entries(data.characters || {}).forEach(([cid, slot]) => {
      const key = 'p::' + player.username + '::' + cid;
      if (!openPanels[key]) return;
      const c = slot.character || {};
      const initMod = parseInt(c.initiative) || 0;
      const initVal = roll ? Math.floor(Math.random() * 20) + 1 + initMod : initMod;
      initState.combatants.push({
        id: key, label: slot.name || player.username,
        avatar: data.avatar || '⚔', type: 'player',
        initVal, hp: parseInt(c.pvActuel)||0, hpMax: parseInt(c.pvMax)||0
      });
    });
  });

  // Local monsters with open panels
  Object.values(localMonsters).forEach(m => {
    const key = 'm::' + m.id;
    if (!openPanels[key]) return;
    const initVal = roll ? Math.floor(Math.random() * 20) + 1 + (parseInt(m.initiative)||0) : (parseInt(m.initiative)||0);
    initState.combatants.push({
      id: key, label: m.name, avatar: m.avatar, type: 'monster',
      initVal, hp: m.hp, hpMax: m.hpMax
    });
  });

  // Sort descending
  initState.combatants.sort((a, b) => b.initVal - a.initVal);
  if (initState.currentIdx >= initState.combatants.length) initState.currentIdx = 0;
  renderInitChips();
}

function renderInitChips() {
  const chips = document.getElementById('init-chips');
  chips.innerHTML = '';

  // Update hp from live data
  initState.combatants.forEach(ct => {
    if (ct.type === 'player') {
      const parts = ct.id.split('::');
      const data  = allPlayers.find(p => p.username === parts[1])?.data;
      const c     = data?.characters?.[parts[2]]?.character;
      if (c) { ct.hp = parseInt(c.pvActuel)||0; ct.hpMax = parseInt(c.pvMax)||0; }
    } else {
      const m = localMonsters[ct.id.replace('m::','')];
      if (m) { ct.hp = m.hp; ct.hpMax = m.hpMax; }
    }
  });

  initState.combatants.forEach((ct, idx) => {
    const pct  = ct.hpMax > 0 ? Math.max(0, Math.min(100, ct.hp / ct.hpMax * 100)) : 0;
    const dead = ct.hp <= 0 && ct.hpMax > 0;
    const active = idx === initState.currentIdx;

    const chip = document.createElement('div');
    chip.className = 'init-chip' + (active ? ' active-turn' : '') + (dead ? ' dead' : '') + (ct.delayed ? ' delayed' : '');
    chip.innerHTML = `
      <span class="chip-avatar">${ct.avatar}</span>
      <input class="init-chip-inp" type="number" value="${ct.initVal}" title="Modifier initiative">
      <span class="chip-name">${esc(ct.label)}</span>
      <div class="chip-hp-bar"><div class="chip-hp-fill" style="width:${pct}%;background:${hpColor(pct)};"></div></div>
      <button class="chip-delay-btn" title="${ct.delayed ? 'Reprendre' : 'Passer (delay)'}">⏸</button>`;

    chip.addEventListener('click', e => {
      if (e.target.classList.contains('init-chip-inp') || e.target.classList.contains('chip-delay-btn')) return;
      initState.currentIdx = idx;
      renderInitChips();
    });
    chip.querySelector('.init-chip-inp').addEventListener('change', e => {
      ct.initVal = parseInt(e.target.value) || 0;
      initState.combatants.sort((a,b) => b.initVal - a.initVal);
      initState.currentIdx = initState.combatants.findIndex(x => x.id === ct.id);
      renderInitChips();
      saveDmState();
    });
    chip.querySelector('.chip-delay-btn').addEventListener('click', e => {
      e.stopPropagation();
      ct.delayed = !ct.delayed;
      renderInitChips();
      saveDmState();
    });
    chips.appendChild(chip);
  });
}

function removeInitCombatant(key) {
  initState.combatants = initState.combatants.filter(c => c.id !== key);
  if (initState.currentIdx >= initState.combatants.length) initState.currentIdx = Math.max(0, initState.combatants.length - 1);
  renderInitChips();
}

const DM_CHAT_TABLE = '/rest/v1/chat_messages';
let _chatLastId  = 0;
let _chatUnread  = 0;
let _chatRoom    = 'general';   // room active
let _chatRooms   = ['general']; // toutes les rooms connues

document.getElementById('chat-section-header').addEventListener('click', () => {
  document.getElementById('chat-section').classList.toggle('collapsed');
  if (!document.getElementById('chat-section').classList.contains('collapsed')) {
    _chatUnread = 0;
    const badge = document.getElementById('chat-unread-badge');
    badge.textContent = '0';
    badge.classList.remove('visible');
  }
});

/* ── Tabs de rooms ── */
function renderChatRoomTabs() {
  const container = document.getElementById('chat-room-tabs');
  if (!container) return;
  // General + une room privée par joueur (dm_{username})
  const players = allPlayers.filter(p => p.username !== ADMIN_USER);
  _chatRooms = ['general', ...players.map(p => 'dm_' + p.username)];
  container.innerHTML = _chatRooms.map(r => {
    const label = r === 'general' ? 'Général'
      : (allPlayers.find(p => 'dm_' + p.username === r)?.data?.characters?.[allPlayers.find(p2=>'dm_'+p2.username===r)?.data?.activeCharId]?.name
         || r.replace('dm_', ''));
    return `<button class="chat-room-tab${r === _chatRoom ? ' active' : ''}" data-room="${esc(r)}">${esc(label)}</button>`;
  }).join('');
  container.querySelectorAll('.chat-room-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      _chatRoom = btn.dataset.room;
      renderChatRoomTabs();
      loadDmChat();
    });
  });
}

/* ── Chargement des messages de la room active ── */
async function loadDmChat() {
  const list = document.getElementById('chat-msgs-list');
  list.innerHTML = '<div class="loading">Chargement…</div>';
  try {
    const r = await sbFetch(`${DM_CHAT_TABLE}?room=eq.${encodeURIComponent(_chatRoom)}&order=id.desc&limit=40`);
    if (!r.ok) { list.innerHTML = '<div style="color:var(--text-dim);font-size:0.78rem;padding:0.3rem;">Erreur réseau.</div>'; return; }
    const msgs = (await r.json()).reverse();
    if (msgs.length) _chatLastId = msgs[msgs.length - 1].id;
    renderDmChat(msgs);
  } catch(e) { list.innerHTML = '<div style="color:var(--text-dim);font-size:0.78rem;padding:0.3rem;">Erreur réseau.</div>'; }
}

function renderDmChat(msgs) {
  const list = document.getElementById('chat-msgs-list');
  if (!msgs.length) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:0.78rem;font-style:italic;padding:0.3rem 0;">Aucun message.</div>';
    return;
  }
  list.innerHTML = msgs.map(m => `
    <div class="dm-chat-msg${m.username === 'MJ' ? ' dm-own' : ''}">
      <span class="chat-author">${esc(m.username || '?')}</span>
      <span class="chat-text">${esc(m.content || '')}</span>
    </div>`).join('');
  list.scrollTop = list.scrollHeight;
}

function _appendChatMsg(m) {
  const list = document.getElementById('chat-msgs-list');
  // Supprimer le placeholder "Aucun message" si présent
  const placeholder = list.querySelector('div[style]');
  if (placeholder && placeholder.textContent.includes('Aucun')) placeholder.remove();

  const div = document.createElement('div');
  div.className = 'dm-chat-msg' + (m.username === 'MJ' ? ' dm-own' : '');
  div.innerHTML = `<span class="chat-author">${esc(m.username || '?')}</span><span class="chat-text">${esc(m.content || '')}</span>`;
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;

  if (document.getElementById('chat-section').classList.contains('collapsed')) {
    _chatUnread++;
    const badge = document.getElementById('chat-unread-badge');
    badge.textContent = _chatUnread;
    badge.classList.add('visible');
  }
}

/* ── Envoi d'un message ── */
async function sendDmMessage() {
  const inp = document.getElementById('dm-chat-input');
  const btn = document.getElementById('dm-chat-send');
  const msg = inp?.value?.trim();
  if (!msg) return;
  inp.value = '';
  btn.disabled = true;
  try {
    const r = await sbFetch(DM_CHAT_TABLE, {
      method: 'POST',
      body: JSON.stringify({ username: 'MJ', content: msg, room: _chatRoom, type: 'chat' }),
      headers: { 'Prefer': 'return=minimal' }
    });
    if (!r.ok) { inp.value = msg; } // restaurer si erreur
  } catch(e) { inp.value = msg; }
  btn.disabled = false;
  inp.focus();
}

// Wiring send button + Enter key
document.getElementById('dm-chat-send')?.addEventListener('click', sendDmMessage);
document.getElementById('dm-chat-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDmMessage(); }
});

/* ── Realtime toutes rooms ── */
function startDmChatRealtime() {
  if (!window.supabase) return;
  try {
    const client = window.supabase.createClient(SB_URL, SB_KEY);
    client.channel('dm-chat-watch')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
        const m = payload.new;
        // Afficher seulement si on est dans la bonne room
        if (m.room === _chatRoom) _appendChatMsg(m);
        else {
          // Incrémenter le badge de la section si la room est différente
          if (document.getElementById('chat-section').classList.contains('collapsed') || m.room !== _chatRoom) {
            _chatUnread++;
            const badge = document.getElementById('chat-unread-badge');
            badge.textContent = _chatUnread;
            badge.classList.add('visible');
          }
        }
      })
      .subscribe();
  } catch(e) {}
}

/* ══════════════════════════════════════════
   Utils
══════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hpColor(pct) {
  if (pct > 60) return '#27ae60';
  if (pct > 30) return '#e67e22';
  if (pct > 0)  return '#c0392b';
  return '#4a0000';
}
function fmtInit(v) {
  if (v === undefined || v === null || v === '') return '—';
  const n = parseInt(v);
  return isNaN(n) ? '—' : (n >= 0 ? '+'+n : String(n));
}
